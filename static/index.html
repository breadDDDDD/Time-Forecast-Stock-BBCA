<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBCA Chronos Intelligence</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>body { background-color: #050506; }</style>
</head>
<body class="text-gray-100 font-sans min-h-screen flex flex-col bg-neutral-950">
    <header class="border-b border-neutral-800 bg-neutral-950/80 backdrop-blur px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="h-3 w-3 rounded-full bg-pink-500 animate-pulse"></div>
            <h1 class="text-xl font-black uppercase tracking-wider bg-gradient-to-r from-pink-500 to-purple-500 bg-clip-text text-transparent">BBCA Chronos Intelligence</h1>
        </div>
        <div class="text-xs font-mono text-neutral-500">Core v1.0</div>
    </header>
    <main class="flex-grow max-w-7xl w-full mx-auto p-6 flex flex-col gap-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="bg-neutral-950 border border-neutral-800 p-6"><div class="text-xs font-mono text-neutral-400">Target Asset</div><div class="text-2xl font-bold">BBCA.JK</div></div>
            <div class="bg-neutral-950 border border-neutral-800 p-6"><div class="text-xs font-mono text-neutral-400">Last Close</div><div id="current-price-display" class="text-2xl font-bold">IDR --</div></div>
            <div class="bg-neutral-950 border border-neutral-800 p-4 flex items-center"><button id="forecast-trigger" class="w-full py-4 bg-gradient-to-r from-pink-600 to-purple-600 text-sm font-bold uppercase text-white shadow-lg cursor-pointer">Generate Forecast</button></div>
        </div>
        <div id="loading-overlay" class="hidden bg-neutral-950 border border-pink-500/30 p-6 flex flex-col items-center justify-center gap-3">
            <div class="w-8 h-8 border-4 border-purple-500 border-t-pink-500 rounded-full animate-spin"></div>
            <div id="loading-text" class="text-xs font-mono text-pink-400 uppercase tracking-widest">Processing Matrix...</div>
        </div>
        <div id="dashboard-content" class="grid grid-cols-1 lg:grid-cols-3 gap-6 opacity-40 pointer-events-none">
            <div class="lg:col-span-2 bg-neutral-950 border border-neutral-800 p-6 h-96"><canvas id="forecastChart"></canvas></div>
            <div class="bg-neutral-950 border border-neutral-800 p-6">
                <h3 class="text-sm font-bold uppercase mb-4 border-b border-neutral-800 pb-2">Outputs</h3>
                <table class="w-full text-left text-sm font-mono">
                    <thead><tr class="text-xs text-neutral-500 border-b border-neutral-800"><th class="py-2">Horizon</th><th class="py-2">Date</th><th class="py-2 text-right">Value</th></tr></thead>
                    <tbody id="forecast-table-body"><tr><td colspan="3" class="py-4 text-center text-neutral-600">No Data Available</td></tr></tbody>
                </table>
            </div>
        </div>
    </main>
    <script>
        let chartInstance = null;
        const ui = {
            trigger: document.getElementById('forecast-trigger'),
            loading: document.getElementById('loading-overlay'),
            loadingText: document.getElementById('loading-text'),
            dashboard: document.getElementById('dashboard-content'),
            price: document.getElementById('current-price-display'),
            table: document.getElementById('forecast-table-body'),
            canvas: document.getElementById('forecastChart')
        };
        ui.trigger.addEventListener('click', async () => {
            ui.loading.classList.remove('hidden');
            ui.dashboard.classList.add('opacity-40', 'pointer-events-none');
            try {
                const res = await fetch('/api/v1/forecast');
                const data = await res.json();
                ui.price.innerText = IDR ;
                ui.table.innerHTML = '';
                data.forecast.forEach(item => {
                    ui.table.innerHTML += <tr><td class='py-2 text-pink-500'>Day \</td><td>\</td><td class='text-right text-purple-400'>\</td></tr>;
                });
                if(chartInstance) chartInstance.destroy();
                const labels = [...data.history_dates];
                const histValues = [...data.history_prices];
                const fullLabels = [...labels];
                const foreValues = new Array(histValues.length).fill(null);
                foreValues[histValues.length - 1] = histValues[histValues.length - 1];
                data.forecast.forEach(p => { fullLabels.push(p.date); foreValues.push(p.value); });
                chartInstance = new Chart(ui.canvas.getContext('2d'), {
                    type: 'line',
                    data: {
                        labels: fullLabels,
                        datasets: [
                            { label: 'History', data: histValues, borderColor: '#A855F7', fill: false, pointRadius: 0 },
                            { label: 'Forecast', data: foreValues, borderColor: '#FF2E93', borderDash: [5,5], fill: false }
                        ]
                    },
                    options: { responsive: true, maintainAspectRatio: false }
                });
                ui.loading.classList.add('hidden');
                ui.dashboard.classList.remove('opacity-40', 'pointer-events-none');
            } catch(e) { alert(e); ui.loading.classList.add('hidden'); }
        });
    </script>
</body>
</html>
